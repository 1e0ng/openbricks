name: ci

on:
  push:
    branches: [main]
    tags:
      # Firmware releases use the plain ``v*`` namespace; the CLI
      # uses its own ``openbricks-dev/v*`` namespace so the two can
      # be cut independently.
      - "v*"
      - "openbricks-dev/v*"
  pull_request:
    branches: [main]

permissions:
  contents: write        # release job needs to create/update releases
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev pkg-config

      - name: Init MicroPython sub-submodules
        run: |
          git -C native/micropython submodule update --init \
            lib/berkeley-db-1.xx lib/micropython-lib lib/mbedtls

      - name: Build mpy-cross
        run: make -C native/micropython/mpy-cross -j

      - name: Build unix MicroPython with openbricks user_c_module
        run: |
          make -C native/micropython/ports/unix \
            VARIANT=standard \
            USER_C_MODULES=$(pwd)/native/user_c_modules \
            -j

      - name: Run test suite under unix MicroPython
        run: ./native/micropython/ports/unix/build-standard/micropython tests/run.py

  cpython-tests:
    # Run every CPython-compatible firmware test under stock CPython 3.
    #
    # Why this exists alongside the ``test`` job (which runs the full
    # suite under unix MicroPython): MP and CPython have small but
    # real interpreter differences. ``builtins.print`` rebinds
    # differently, ``sys.print_exception`` exists on MP but not
    # CPython, ``time.sleep_ms`` is MP-only, etc. The firmware tests
    # mostly paper over these via ``tests/_fakes.py``, but a test
    # that accidentally relies on a CPython-only construct or an
    # MP-only one only shows up if we exercise both interpreters.
    #
    # Excluded tests need the ``_openbricks_native`` C module
    # (observer, trajectory, scheduler, servo / drivebase, encoder,
    # mg370, bno055, pcnt_encoder). Those run under MP only via the
    # ``test`` and ``coverage`` jobs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run CPython-compatible firmware tests under CPython
        run: |
          python -m unittest \
            tests.test_bluetooth \
            tests.test_bluetooth_button \
            tests.test_ble_repl \
            tests.test_hub \
            tests.test_launcher \
            tests.test_l298n \
            tests.test_tcs34725 \
            tests.test_st3215 \
            tests.test_ssd1306 \
            tests.test_tb6612

  openbricks-py:
    # Python-layer coverage of the firmware package (``openbricks/``).
    # Only the modules that don't need the ``_openbricks_native`` C
    # module are covered here — bluetooth, ble_repl, launcher,
    # bluetooth_button, hub, __init__, interfaces. The rest (drivers,
    # drivebase, scheduler) run against the real C code under MicroPython
    # in the ``test`` + ``coverage`` jobs below, so they're covered
    # there instead (as C lines, via gcov).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install coverage
        run: |
          python -m pip install --upgrade pip
          pip install coverage

      - name: Run CPython-compatible firmware tests under coverage
        # Restrict coverage to the files the tests actually exercise
        # so drivers/etc. don't show up as 0% Python-covered (they're
        # C-covered — different surface).
        run: |
          python -m coverage run \
            --include='openbricks/__init__.py,openbricks/interfaces.py,openbricks/bluetooth.py,openbricks/ble_repl.py,openbricks/bluetooth_button.py,openbricks/hub.py,openbricks/launcher.py,openbricks/log.py' \
            -m unittest \
              tests.test_bluetooth \
              tests.test_bluetooth_button \
              tests.test_ble_repl \
              tests.test_hub \
              tests.test_launcher \
              tests.test_log
          python -m coverage report
          python -m coverage xml -o coverage.xml

      - name: Upload openbricks-py coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: openbricks-py
          fail_ci_if_error: false

  openbricks-dev:
    # Host-side CLI tests (tools/openbricks-dev). Pure CPython, no BLE,
    # no esptool — subprocess.run and BleakScanner are mocked so this
    # job runs fast and has no hardware dependency.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install openbricks-dev (editable) + coverage
        working-directory: tools/openbricks-dev
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install coverage

      - name: Run CLI test suite under coverage
        working-directory: tools/openbricks-dev
        # Cover the ``openbricks_dev`` package only; the ``tests``
        # themselves would inflate the number without measuring the
        # thing we ship.
        run: |
          coverage run --source=openbricks_dev -m unittest discover -s tests -t .
          coverage report
          coverage xml -o coverage.xml

      - name: Upload openbricks-dev coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: tools/openbricks-dev/coverage.xml
          # Separate flag so the dashboard tracks host-CLI coverage
          # independently from the C ``c-core`` flag below.
          flags: openbricks-dev
          fail_ci_if_error: false

      - name: Smoke-test the entry point
        run: |
          openbricks-dev --help
          openbricks-dev flash --help
          openbricks-dev list --help
          openbricks-dev run --help
          openbricks-dev download --help
          openbricks-dev stop --help

  openbricks-sim:
    # MuJoCo-backed simulator tests (tools/openbricks-sim). Pure
    # CPython, MuJoCo is pure pip. Runs headless — no GPU needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install openbricks-sim (editable) + coverage
        working-directory: tools/openbricks-sim
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install coverage

      - name: Run sim test suite under coverage
        working-directory: tools/openbricks-sim
        run: |
          coverage run --source=openbricks_sim -m unittest discover -s tests -t .
          coverage report
          coverage xml -o coverage.xml

      - name: Upload openbricks-sim coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: tools/openbricks-sim/coverage.xml
          flags: openbricks-sim
          fail_ci_if_error: false

      - name: Smoke-test the entry point
        run: |
          openbricks-sim --help
          openbricks-sim preview --help
          # Headless preview of each shipped world (no display on CI).
          openbricks-sim preview --headless --duration 0.2 --world empty
          openbricks-sim preview --headless --duration 0.2 --world wro-2026-elementary
          openbricks-sim preview --headless --duration 0.2 --world wro-2026-junior
          openbricks-sim preview --headless --duration 0.2 --world wro-2026-senior

  coverage:
    runs-on: ubuntu-latest
    # C coverage for the openbricks user_c_module, following the same
    # pattern MicroPython itself uses (ports/unix VARIANT=coverage +
    # gcov + codecov-action). Python coverage isn't attempted — our
    # tests run under unix MicroPython, where coverage.py doesn't apply.
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev pkg-config

      - name: Init MicroPython sub-submodules
        run: |
          git -C native/micropython submodule update --init \
            lib/berkeley-db-1.xx lib/micropython-lib lib/mbedtls

      - name: Build mpy-cross
        run: make -C native/micropython/mpy-cross -j

      - name: Build unix MicroPython (coverage variant) with openbricks
        run: |
          make -C native/micropython/ports/unix \
            VARIANT=coverage \
            USER_C_MODULES=$(pwd)/native/user_c_modules \
            -j

      - name: Run test suite against coverage binary
        # The coverage variant is debug-built and runs ~5× slower than
        # standard; the extra CPU time makes a few integration tests
        # that are timing-sensitive fail under coverage. Partial runs
        # still produce useful ``.gcda`` files, so we tolerate non-zero
        # exit here and rely on the standard ``test`` job above to gate
        # merges on pass/fail.
        run: |
          ./native/micropython/ports/unix/build-coverage/micropython tests/run.py || true

      - name: Run gcov over openbricks C sources
        run: |
          cd native/micropython/ports/unix
          for src in "$GITHUB_WORKSPACE"/native/user_c_modules/openbricks/*.c; do
            gcov -o build-coverage/openbricks "$src" || true
          done

      - name: Stage openbricks gcov output for Codecov
        # Copy just our .gcov files to a dedicated directory — keeps
        # Codecov from indexing hundreds of MicroPython-core reports
        # that got generated alongside ours. Matches the gcov files
        # produced above 1:1.
        run: |
          mkdir -p coverage-out
          for f in drivebase drivebase_core \
                   encoder \
                   motor_process motor_process_core \
                   observer observer_core \
                   pcnt_encoder \
                   servo servo_core \
                   trajectory trajectory_core; do
            cp "native/micropython/ports/unix/${f}.c.gcov" "coverage-out/" || true
          done
          ls coverage-out/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage-out
          flags: c-core
          fail_ci_if_error: false

  firmware:
    # Skip firmware builds for openbricks-dev-only tag pushes — those
    # cut a host-CLI release that doesn't touch the image.
    if: ${{ !startsWith(github.ref, 'refs/tags/openbricks-dev/') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [esp32, esp32s3]
    # Espressif's official ESP-IDF image — pinned to v5.5.4, matched
    # to the MicroPython master commit the ``native/micropython``
    # submodule tracks.
    container:
      image: espressif/idf:v5.5.4
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Mark workdir as safe for git
        run: git config --global --add safe.directory '*'

      - name: Init MicroPython sub-submodules
        run: |
          git -C native/micropython submodule update --init --recursive

      - name: Build mpy-cross
        run: make -C native/micropython/mpy-cross -j

      - name: Build firmware image (${{ matrix.target }})
        shell: bash
        run: |
          # The espressif/idf container sets $IDF_PATH but GitHub Actions
          # bypasses its entrypoint, so idf.py isn't on $PATH yet.
          . "$IDF_PATH/export.sh"
          ./scripts/build_firmware.sh ${{ matrix.target }}

      - name: Stage release files
        id: meta
        shell: bash
        run: |
          TARGET=${{ matrix.target }}
          mkdir -p release-out
          BUILD_DIR=native/micropython/ports/esp32/build-openbricks_${TARGET}

          # Tag name for versioned releases (e.g. ``v0.9.0``); literal
          # ``latest`` for rolling pre-releases from ``main``. Keeping
          # the main-branch name short and constant means the filename
          # is stable across main pushes — users pointing at
          # ``latest`` can rely on the same URL.
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="latest"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Version-stamp every filename so an extracted .bin still
          # carries its provenance — the containing folder name is
          # lost the moment someone downloads a single asset.
          cp $BUILD_DIR/firmware.bin                          release-out/openbricks-${TARGET}-firmware-${VERSION}.bin
          cp $BUILD_DIR/bootloader/bootloader.bin             release-out/openbricks-${TARGET}-bootloader-${VERSION}.bin
          cp $BUILD_DIR/partition_table/partition-table.bin   release-out/openbricks-${TARGET}-partition-table-${VERSION}.bin
          cp $BUILD_DIR/micropython.bin                       release-out/openbricks-${TARGET}-application-${VERSION}.bin

          ls -lah release-out/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: openbricks-${{ matrix.target }}-${{ steps.meta.outputs.version }}
          path: release-out/
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [test, firmware]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      # Download every matrix artifact (openbricks-esp32-*, openbricks-esp32s3-*, …)
      # and merge them into a single release-out/ directory.
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openbricks-*-${{ needs.firmware.outputs.version }}
          path: release-out/
          merge-multiple: true

      # Rolling ``latest`` pre-release for every push to main — the
      # GitHub-native way to expose the "head of main" firmware image
      # without us managing tags manually. Existing assets are replaced
      # on each run; the release itself is kept (just re-pointed to the
      # new commit).
      - name: Publish rolling latest (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest (main)
          prerelease: true
          make_latest: false
          body: |
            Rolling firmware build from `main`.

            Commit: ${{ github.sha }}
            ESP-IDF: v5.5.4

            Images:
            - `openbricks-esp32-firmware-latest.bin` — original ESP32 (Xtensa LX6)
            - `openbricks-esp32s3-firmware-latest.bin` — ESP32-S3 (Xtensa LX7, native USB)

            Flash with `openbricks-dev flash` or `esptool.py` — see `docs/build.md`.
          files: release-out/*
          # action-gh-release is idempotent: re-running replaces the
          # release's assets in place.
          fail_on_unmatched_files: true

      # Versioned release for every ``v*`` tag push. Promoted to
      # "latest" in GitHub's UI (the yellow star) — this is the
      # primary artifact users download.
      - name: Publish versioned release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          make_latest: true
          generate_release_notes: true
          files: release-out/*
          fail_on_unmatched_files: true

  publish-openbricks-dev:
    # Publish the host CLI to PyPI on every ``openbricks-dev/v*`` tag
    # push. The CLI is versioned independently from the firmware
    # (separate ``VERSION`` files, separate tag namespaces), so
    # cutting a CLI release doesn't require a firmware release and
    # vice versa.
    #
    # Trusted Publisher (OIDC) was set up on PyPI during the 0.9.2
    # release — no API token is stored in the repo. See the project
    # README / CONTRIBUTING for how to rotate if needed.
    needs: [openbricks-dev]
    if: startsWith(github.ref, 'refs/tags/openbricks-dev/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required by PyPI trusted publisher (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        working-directory: tools/openbricks-dev
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: tools/openbricks-dev/dist/
