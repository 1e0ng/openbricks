name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python (for mpy-cross build)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev pkg-config

      - name: Init MicroPython sub-submodules (berkeley-db, lib, mbedtls)
        run: |
          git -C native/micropython submodule update --init \
            lib/berkeley-db-1.xx lib/micropython-lib lib/mbedtls

      - name: Build mpy-cross
        run: make -C native/micropython/mpy-cross -j

      - name: Build unix MicroPython with openbricks user_c_module
        run: |
          make -C native/micropython/ports/unix \
            VARIANT=standard \
            USER_C_MODULES=$(pwd)/native/user_c_modules \
            -j

      - name: Run test suite under unix MicroPython
        run: |
          ./native/micropython/ports/unix/build-standard/micropython tests/run.py
