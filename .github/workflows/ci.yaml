name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write        # release job needs to create/update releases
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev pkg-config

      - name: Init MicroPython sub-submodules
        run: |
          git -C native/micropython submodule update --init \
            lib/berkeley-db-1.xx lib/micropython-lib lib/mbedtls

      - name: Build mpy-cross
        run: make -C native/micropython/mpy-cross -j

      - name: Build unix MicroPython with openbricks user_c_module
        run: |
          make -C native/micropython/ports/unix \
            VARIANT=standard \
            USER_C_MODULES=$(pwd)/native/user_c_modules \
            -j

      - name: Run test suite under unix MicroPython
        run: ./native/micropython/ports/unix/build-standard/micropython tests/run.py

  firmware-esp32:
    runs-on: ubuntu-latest
    # Espressif's official ESP-IDF image — pinned to v5.5.4, matched
    # to the MicroPython master commit the ``native/micropython``
    # submodule tracks.
    container:
      image: espressif/idf:v5.5.4
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Mark workdir as safe for git
        run: git config --global --add safe.directory '*'

      - name: Init MicroPython sub-submodules
        run: |
          git -C native/micropython submodule update --init --recursive

      - name: Build mpy-cross
        run: make -C native/micropython/mpy-cross -j

      - name: Build ESP32 firmware image
        shell: bash
        run: |
          # The espressif/idf container sets $IDF_PATH but GitHub Actions
          # bypasses its entrypoint, so idf.py isn't on $PATH yet.
          . "$IDF_PATH/export.sh"
          ./scripts/build_firmware.sh esp32

      - name: Stage release files
        id: meta
        shell: bash
        run: |
          mkdir -p release-out
          BUILD_DIR=native/micropython/ports/esp32/build-openbricks_esp32
          cp $BUILD_DIR/firmware.bin                          release-out/openbricks-esp32-firmware.bin
          cp $BUILD_DIR/bootloader/bootloader.bin             release-out/openbricks-esp32-bootloader.bin
          cp $BUILD_DIR/partition_table/partition-table.bin   release-out/openbricks-esp32-partition-table.bin
          cp $BUILD_DIR/micropython.bin                       release-out/openbricks-esp32-application.bin

          # Tag name for versioned releases, or short SHA for rolling
          # ``latest`` pre-releases on main.
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=main-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
          ls -lah release-out/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: openbricks-esp32-${{ steps.meta.outputs.version }}
          path: release-out/
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [test, firmware-esp32]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: openbricks-esp32-${{ needs.firmware-esp32.outputs.version }}
          path: release-out/

      # Rolling ``latest`` pre-release for every push to main — the
      # GitHub-native way to expose the "head of main" firmware image
      # without us managing tags manually. Existing assets are replaced
      # on each run; the release itself is kept (just re-pointed to the
      # new commit).
      - name: Publish rolling latest (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest (main)
          prerelease: true
          make_latest: false
          body: |
            Rolling firmware build from `main`.

            Commit: ${{ github.sha }}
            ESP-IDF: v5.5.4
            Flash `openbricks-esp32-firmware.bin` via `esptool.py` — see `docs/build.md`.
          files: release-out/*
          # action-gh-release is idempotent: re-running replaces the
          # release's assets in place.
          fail_on_unmatched_files: true

      # Versioned release for every ``v*`` tag push. Promoted to
      # "latest" in GitHub's UI (the yellow star) — this is the
      # primary artifact users download.
      - name: Publish versioned release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          make_latest: true
          generate_release_notes: true
          files: release-out/*
          fail_on_unmatched_files: true
