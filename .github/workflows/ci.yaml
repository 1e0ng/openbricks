name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write        # release job needs to create/update releases
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev pkg-config

      - name: Init MicroPython sub-submodules
        run: |
          git -C native/micropython submodule update --init \
            lib/berkeley-db-1.xx lib/micropython-lib lib/mbedtls

      - name: Build mpy-cross
        run: make -C native/micropython/mpy-cross -j

      - name: Build unix MicroPython with openbricks user_c_module
        run: |
          make -C native/micropython/ports/unix \
            VARIANT=standard \
            USER_C_MODULES=$(pwd)/native/user_c_modules \
            -j

      - name: Run test suite under unix MicroPython
        run: ./native/micropython/ports/unix/build-standard/micropython tests/run.py

  coverage:
    runs-on: ubuntu-latest
    # C coverage for the openbricks user_c_module, following the same
    # pattern MicroPython itself uses (ports/unix VARIANT=coverage +
    # gcov + codecov-action). Python coverage isn't attempted — our
    # tests run under unix MicroPython, where coverage.py doesn't apply.
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev pkg-config lcov

      - name: Init MicroPython sub-submodules
        run: |
          git -C native/micropython submodule update --init \
            lib/berkeley-db-1.xx lib/micropython-lib lib/mbedtls

      - name: Build mpy-cross
        run: make -C native/micropython/mpy-cross -j

      - name: Build unix MicroPython (coverage variant) with openbricks
        run: |
          make -C native/micropython/ports/unix \
            VARIANT=coverage \
            USER_C_MODULES=$(pwd)/native/user_c_modules \
            -j

      - name: Run test suite against coverage binary
        # The coverage variant is debug-built and runs ~5× slower than
        # standard; partial runs still produce useful .gcda files, so we
        # tolerate non-zero exit here and rely on the standard `test`
        # job above to gate merges on pass/fail.
        run: |
          ./native/micropython/ports/unix/build-coverage/micropython tests/run.py || true

      - name: Run gcov over openbricks C sources
        run: |
          cd native/micropython/ports/unix
          for src in "$GITHUB_WORKSPACE"/native/user_c_modules/openbricks/*.c; do
            gcov -o build-coverage/openbricks "$src" || true
          done
          ls *.gcov | head

      - name: Collect + filter lcov report
        run: |
          cd native/micropython/ports/unix
          # Capture only files under our user_c_modules tree — exclude
          # MicroPython core, system headers, extmod, etc.
          lcov --capture --directory build-coverage/openbricks \
               --output-file coverage.info \
               --ignore-errors source,unused,format,graph,mismatch,gcov \
               --rc geninfo_unexecuted_blocks=1
          lcov --extract coverage.info '*/native/user_c_modules/openbricks/*.c' \
               --output-file coverage.info \
               --ignore-errors unused
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: native/micropython/ports/unix/coverage.info
          flags: c-core
          disable_search: true
          fail_ci_if_error: false

  firmware:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [esp32, esp32s3]
    # Espressif's official ESP-IDF image — pinned to v5.5.4, matched
    # to the MicroPython master commit the ``native/micropython``
    # submodule tracks.
    container:
      image: espressif/idf:v5.5.4
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Mark workdir as safe for git
        run: git config --global --add safe.directory '*'

      - name: Init MicroPython sub-submodules
        run: |
          git -C native/micropython submodule update --init --recursive

      - name: Build mpy-cross
        run: make -C native/micropython/mpy-cross -j

      - name: Build firmware image (${{ matrix.target }})
        shell: bash
        run: |
          # The espressif/idf container sets $IDF_PATH but GitHub Actions
          # bypasses its entrypoint, so idf.py isn't on $PATH yet.
          . "$IDF_PATH/export.sh"
          ./scripts/build_firmware.sh ${{ matrix.target }}

      - name: Stage release files
        id: meta
        shell: bash
        run: |
          TARGET=${{ matrix.target }}
          mkdir -p release-out
          BUILD_DIR=native/micropython/ports/esp32/build-openbricks_${TARGET}
          cp $BUILD_DIR/firmware.bin                          release-out/openbricks-${TARGET}-firmware.bin
          cp $BUILD_DIR/bootloader/bootloader.bin             release-out/openbricks-${TARGET}-bootloader.bin
          cp $BUILD_DIR/partition_table/partition-table.bin   release-out/openbricks-${TARGET}-partition-table.bin
          cp $BUILD_DIR/micropython.bin                       release-out/openbricks-${TARGET}-application.bin

          # Tag name for versioned releases, or short SHA for rolling
          # ``latest`` pre-releases on main.
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=main-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
          ls -lah release-out/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: openbricks-${{ matrix.target }}-${{ steps.meta.outputs.version }}
          path: release-out/
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [test, firmware]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      # Download every matrix artifact (openbricks-esp32-*, openbricks-esp32s3-*, …)
      # and merge them into a single release-out/ directory.
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openbricks-*-${{ needs.firmware.outputs.version }}
          path: release-out/
          merge-multiple: true

      # Rolling ``latest`` pre-release for every push to main — the
      # GitHub-native way to expose the "head of main" firmware image
      # without us managing tags manually. Existing assets are replaced
      # on each run; the release itself is kept (just re-pointed to the
      # new commit).
      - name: Publish rolling latest (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest (main)
          prerelease: true
          make_latest: false
          body: |
            Rolling firmware build from `main`.

            Commit: ${{ github.sha }}
            ESP-IDF: v5.5.4

            Images:
            - `openbricks-esp32-firmware.bin` — original ESP32 (Xtensa LX6)
            - `openbricks-esp32s3-firmware.bin` — ESP32-S3 (Xtensa LX7, native USB)

            Flash with `esptool.py` — see `docs/build.md`.
          files: release-out/*
          # action-gh-release is idempotent: re-running replaces the
          # release's assets in place.
          fail_on_unmatched_files: true

      # Versioned release for every ``v*`` tag push. Promoted to
      # "latest" in GitHub's UI (the yellow star) — this is the
      # primary artifact users download.
      - name: Publish versioned release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          make_latest: true
          generate_release_notes: true
          files: release-out/*
          fail_on_unmatched_files: true
