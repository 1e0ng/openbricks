name: firmware

# Build the openbricks ESP32 firmware image. Requires ESP-IDF 5.x on the
# self-hosted mac-runner and the ``native/micropython`` submodule
# initialised. ``continue-on-error`` is set while the runner's toolchain
# isn't guaranteed; once the runner is provisioned the flag can be
# dropped so the job is load-bearing.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-esp32:
    runs-on: mac-runner
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify MicroPython submodule
        run: |
          if [ ! -f native/micropython/py/mpstate.h ]; then
            echo "native/micropython appears empty or not initialised"
            exit 1
          fi

      - name: Check ESP-IDF
        run: |
          if [ -z "${IDF_PATH:-}" ]; then
            echo "IDF_PATH not set on runner; install ESP-IDF 5.x and export it"
            exit 1
          fi
          idf.py --version

      - name: Build firmware
        run: ./scripts/build_firmware.sh esp32

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openbricks-esp32-${{ github.sha }}
          path: native/micropython/ports/esp32/build-openbricks_esp32/firmware.bin
