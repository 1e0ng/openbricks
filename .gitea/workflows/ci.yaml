name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: mac-runner
    steps:
      - uses: actions/checkout@v4

      - name: Show Python version
        run: python3 --version

      - name: Install coverage
        run: python3 -m pip install --quiet coverage

      - name: Run tests with coverage
        run: |
          python3 -m coverage run --source=openbricks -m unittest discover -s tests -t .
          python3 -m coverage report

      - name: Byte-compile the library
        run: python3 -m compileall openbricks/
