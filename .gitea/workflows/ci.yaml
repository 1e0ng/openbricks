name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: mac-runner
    steps:
      - uses: actions/checkout@v4

      - name: Show Python version
        run: python3 --version

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -t .

      - name: Byte-compile the library
        run: python3 -m compileall openbricks/
